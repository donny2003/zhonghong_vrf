name: Publish Multi-Arch Docker Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# 1. 在这里添加 GITHUB_SHA 变量，用于生成唯一版本号
env:
  IMAGE_NAME: zhonghong_vrf
  # 这个变量会自动获取当前提交的 Commit ID (例如: a1b2c3d)
  IMAGE_TAG: ${{ github.sha }} 

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. 简化 Docker meta 步骤
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            # 始终生成一个 latest 标签
            type=raw,value=latest
            
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 3. 在这里组合标签：同时打上 latest 和 唯一的 Commit ID 标签
          # 结果示例：你的镜像会同时拥有 v1.0:latest 和 v1.0:git-<commit_id> 两个标签
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}-${{ env.IMAGE_TAG }}
          platforms: |
            linux/amd64
            linux/arm64
            linux/arm/v7
