name: Publish Multi-Arch Docker Image

on:
  push:
    branches: [ main ] 
  workflow_dispatch: 

env:
  # 修改这里为你 Dockerfile 中定义的镜像名
  # 例如如果你的 Dockerfile 里是 FROM python:3.9, 这里可以保持默认或自定义
  IMAGE_NAME: zhonghong_vrf 

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ===================================================================
      # === 关键新增：设置 QEMU 以支持多架构模拟 ===
      # ===================================================================
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          # 这会自动注册 binfmt_misc，让 Docker 能模拟其他架构
          platforms: all 

      # ===================================================================
      # === 关键新增：设置 Buildx ===
      # ===================================================================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # 可选：配置缓存，加速构建
          buildx-version: latest 

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=true
            type=raw,value={{.ShortSha}},enable=true

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ===================================================================
      # === 关键修改：Build and push (注意 platforms 参数) ===
      # ===================================================================
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # --- 核心配置：指定要构建的平台 ---
          platforms: |
            linux/amd64,    # Intel/AMD 64位 (x86)
            linux/arm64,    # ARM 64位 (如 树莓派4, Apple M1, 大多数现代 NAS)
            linux/arm/v7    # ARM 32位 v7 (如 树莓派3, 旧款 Home Assistant 设备)
          # -----------------------------
